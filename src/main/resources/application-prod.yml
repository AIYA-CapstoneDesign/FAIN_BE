spring:
  datasource:
    url: jdbc:mysql://mysql:3306/FAIN
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database: mysql
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect


  server:
    forward-headers-strategy: framework
    port: 8080

  jwt:
    secret: ${JWT_SECRET}

  fcm:
    service-account:
      path : ${FCM_KEY_PATH}



